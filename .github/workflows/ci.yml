name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Run Android emulator and tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          script: |
            # TODO: research F-Droid APIs to resolve the latest Conversations APK dynamically
            curl -fsSL -o conversations.apk https://f-droid.org/repo/eu.siacs.conversations_4217304.apk
            adb install -r conversations.apk
            ./scripts/start-sidecar-api.sh
            maestro test flows/
            ./scripts/stop-sidecar-api.sh

      - name: Upload sidecar log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-log
          path: sidecar.log
          retention-days: 7

      - name: Upload maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-logs
          path: ~/.maestro/tests
          retention-days: 7
          include-hidden-files: true
