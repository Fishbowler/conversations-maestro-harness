name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Maestro CLI
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> "$GITHUB_PATH"

      - name: Enable KVM group perms
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Run Android emulator and tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: Nexus 6
          script: |
            # TODO: research F-Droid APIs to resolve the latest Conversations APK dynamically. v2.19.15 is 4217303 (x86_64) and 4217304 (arm64-v8a).
            curl -fsSL -o conversations.apk https://f-droid.org/repo/eu.siacs.conversations_4217303.apk
            adb install -r conversations.apk

            ./scripts/start-sidecar-api.sh
            maestro test flows/ || { RC=$?; adb logcat -d > adb_logcat.log 2>&1; exit $RC; }
            ./scripts/stop-sidecar-api.sh

      - name: Upload ADB logcat on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: adb-logcat
          path: adb_logcat.log
          retention-days: 7

      - name: Upload sidecar log on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: sidecar-log
          path: sidecar.log
          retention-days: 7

      - name: Upload maestro artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: maestro-logs
          path: ~/.maestro/tests
          retention-days: 7
          include-hidden-files: true
